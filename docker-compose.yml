name: cats-project

services:
  cats_python_api:
    build: ./cats-python-api
    container_name: cats-python-api
    ports:
      - "9003:8000"
    env_file:
      - ./.env
    depends_on:
      - cats_database
    volumes:
      - ./cats-python-api:/app
    command: python manage.py runserver 0.0.0.0:8000

  cats_go_api:
    build: ./cats-go-api
    container_name: cats-go-api
    ports:
      - "9001:8080"
    env_file:
      - ./.env
    depends_on:
      - cats_database

  cats_java_api:
    build: ./cats-java-api
    container_name: cats-java-api
    ports:
      - "9002:8081"
    env_file:
      - ./.env
    depends_on:
      - cats_database

  cats_database:
    image: postgres:15
    container_name: cats-database
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: